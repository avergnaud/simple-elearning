---
# =============================================================================
# roles/base/tasks/main.yml — System-level setup
# =============================================================================

- name: Update apt cache and perform a full non-interactive system upgrade
  ansible.builtin.apt:
    update_cache: true
    upgrade: full
    cache_valid_time: 0   # always refresh on this role
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install core system packages
  ansible.builtin.apt:
    name:
      - python3.13
      - python3.13-venv
      - python3-pip
      - git
      - curl
      - nginx
      - certbot
      - python3-certbot-nginx
      - postgresql-17
      - libpq-dev
      - acl
      - python3-psycopg2
      - net-tools
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install WeasyPrint system-level dependencies
  ansible.builtin.apt:
    name:
      - libpango-1.0-0
      - libpangoft2-1.0-0
      - libgdk-pixbuf2.0-0
      - libffi-dev
      - shared-mime-info
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Create dedicated system user for the application (no login shell)
  ansible.builtin.user:
    name: "{{ app_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/elearning
    create_home: true
    state: present

- name: Create application directory owned by {{ app_user }}
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"

- name: Create static-files directory owned by {{ app_user }}
  ansible.builtin.file:
    path: "{{ static_root }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"

- name: Create media-files directory owned by {{ app_user }}
  ansible.builtin.file:
    path: "{{ media_root }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"

# =============================================================================
# UFW firewall
# Rules are applied before UFW is enabled to avoid any lockout risk.
# =============================================================================

- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Set UFW default incoming policy to deny
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set UFW default outgoing policy to deny
  community.general.ufw:
    direction: outgoing
    default: deny

- name: Allow incoming SSH (rate-limited)
  community.general.ufw:
    rule: limit
    direction: in
    port: "22"
    proto: tcp

- name: Allow incoming HTTP (Nginx redirect + Let's Encrypt renewal)
  community.general.ufw:
    rule: allow
    direction: in
    port: "80"
    proto: tcp

- name: Allow incoming HTTPS
  community.general.ufw:
    rule: allow
    direction: in
    port: "443"
    proto: tcp

- name: Allow outgoing SSH (git push/pull to remote repositories)
  community.general.ufw:
    rule: allow
    direction: out
    port: "22"
    proto: tcp

- name: Allow outgoing DNS (UDP)
  community.general.ufw:
    rule: allow
    direction: out
    port: "53"
    proto: udp

- name: Allow outgoing DNS (TCP)
  community.general.ufw:
    rule: allow
    direction: out
    port: "53"
    proto: tcp

- name: Allow outgoing HTTP (apt package lists)
  community.general.ufw:
    rule: allow
    direction: out
    port: "80"
    proto: tcp

- name: Allow outgoing HTTPS (apt, Let's Encrypt, APIs)
  community.general.ufw:
    rule: allow
    direction: out
    port: "443"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled
